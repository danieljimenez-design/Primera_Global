<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeraGlobal · Planeación de Programas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#5B9BD5; --blue-600:#4583BC; --blue-700:#356397;
  --blue-light:#A9CBED; --blue-pale:#EAF3FC; --blue-pale2:#F4F9FE;
  --ink:#15181D; --ink-2:#39404B; --muted:#737C89; --muted-2:#9AA3B0;
  --line:#E6ECF3; --line-2:#D5DEE9; --bg:#F2F6FB; --white:#FFFFFF;
  --green:#1F9D6E; --green-pale:#E6F6EF;
  --amber:#D6921F; --amber-pale:#FBF1DD;
  --red:#D5524F; --red-pale:#FBE9E8;
  --shadow-sm:0 1px 2px rgba(20,30,50,.06),0 1px 3px rgba(20,30,50,.04);
  --shadow:0 4px 16px rgba(20,40,70,.08),0 2px 6px rgba(20,40,70,.05);
  --shadow-lg:0 18px 50px rgba(20,40,70,.16);
  --r:14px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;line-height:1.12}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--blue-600);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px;border:2px solid var(--bg)}
::selection{background:var(--blue-light)}

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;flex:0 0 248px;background:var(--white);border-right:1px solid var(--line);
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:22px 16px;z-index:30}
.logo{display:flex;align-items:center;gap:10px;padding:4px 8px 22px;border-bottom:1px solid var(--line);margin-bottom:14px}
.logo-text{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;letter-spacing:-.03em;color:var(--ink)}
.logo-text .b{color:var(--ink)}
.nav{display:flex;flex-direction:column;gap:3px}
.nav-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:var(--r-sm);
  color:var(--ink-2);font-weight:600;font-size:14px;transition:.16s;text-align:left;width:100%}
.nav-item:hover{background:var(--blue-pale)}
.nav-item.active{background:var(--ink);color:#fff}
.nav-item.active svg{stroke:#fff}
.nav-item svg{width:18px;height:18px;stroke:var(--ink-2);flex-shrink:0}
.nav-item:hover svg{stroke:var(--blue-600)}
.sidebar-foot{margin-top:auto;font-size:11px;color:var(--muted-2);padding:14px 10px 0;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.io-btns{display:flex;gap:6px}
.io-btns button{flex:1;font-size:11px;font-weight:700;color:var(--ink-2);background:var(--bg);
  border:1px solid var(--line);border-radius:8px;padding:7px 4px}
.io-btns button:hover{background:var(--blue-pale);border-color:var(--blue-light)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;
  padding:0 30px;position:sticky;top:0;z-index:20}
.crumb{font-size:13px;color:var(--muted);font-weight:600}
.crumb b{color:var(--ink)}
.topbar-spacer{flex:1}
.content{padding:30px;max-width:1180px;width:100%;margin:0 auto;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;
  font-weight:700;font-size:14px;transition:.16s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:#000;transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-600);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn-ghost{background:var(--white);color:var(--ink-2);border:1px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--blue-light);background:var(--blue-pale);color:var(--blue-700)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn-danger-ghost{color:var(--red);background:var(--white);border:1px solid var(--line-2)}
.btn-danger-ghost:hover{background:var(--red-pale);border-color:var(--red)}
.icon-btn{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--white);border:1px solid var(--line);transition:.16s}
.icon-btn:hover{background:var(--blue-pale);border-color:var(--blue-light)}
.icon-btn svg{width:16px;height:16px;stroke:var(--ink-2)}
.icon-btn.del:hover{background:var(--red-pale);border-color:var(--red)}
.icon-btn.del:hover svg{stroke:var(--red)}

/* ---------- Page head ---------- */
.page-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:26px}
.page-head .ph-text{flex:1;min-width:0}
.page-head h1{font-size:30px;font-weight:800;margin-bottom:5px}
.page-head .sub{color:var(--muted);font-size:14px;font-weight:500}

/* ---------- Cards / grid ---------- */
.grid{display:grid;gap:18px}
.cards{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.prog-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow-sm);transition:.2s;cursor:pointer;display:flex;flex-direction:column}
.prog-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--blue-light)}
.pc-banner{height:96px;background:linear-gradient(120deg,var(--blue-700),var(--blue) 70%,var(--blue-light));
  position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:14px}
.pc-banner::after{content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle at 80% 20%,rgba(255,255,255,.25),transparent 40%),
  repeating-linear-gradient(45deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px)}
.pc-banner .globe-deco{position:absolute;right:-18px;top:-18px;width:120px;height:120px;opacity:.22}
.pc-flags{position:relative;z-index:2;display:flex;gap:5px;flex-wrap:wrap}
.flag-chip{background:rgba(255,255,255,.92);border-radius:7px;padding:3px 9px;font-size:11px;
  font-weight:700;color:var(--ink);display:flex;align-items:center;gap:4px}
.pc-body{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column}
.pc-body h3{font-size:18px;font-weight:700;margin-bottom:5px;color:var(--ink)}
.pc-meta{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.pc-stats{display:flex;gap:16px;margin-top:auto;padding-top:14px;border-top:1px solid var(--line)}
.pc-stat .n{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;color:var(--ink)}
.pc-stat .l{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}

.new-card{border:2px dashed var(--line-2);background:transparent;border-radius:var(--r);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  min-height:230px;color:var(--muted);font-weight:700;transition:.18s;cursor:pointer}
.new-card:hover{border-color:var(--blue);background:var(--blue-pale2);color:var(--blue-700)}
.new-card .plus{width:50px;height:50px;border-radius:50%;background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;transition:.18s}
.new-card:hover .plus{background:var(--blue);transform:rotate(90deg)}

/* ---------- Empty ---------- */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .ico{width:70px;height:70px;margin:0 auto 18px;border-radius:20px;background:var(--blue-pale);
  display:flex;align-items:center;justify-content:center}
.empty .ico svg{width:34px;height:34px;stroke:var(--blue)}
.empty h3{font-size:20px;color:var(--ink);margin-bottom:7px}
.empty p{max-width:380px;margin:0 auto 20px;font-size:14px}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px;overflow-x:auto;padding-bottom:0}
.tab{padding:11px 15px;font-weight:700;font-size:13.5px;color:var(--muted);border-bottom:2.5px solid transparent;
  transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--ink);border-bottom-color:var(--blue)}
.tab .cnt{background:var(--bg);color:var(--muted);font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px}
.tab.active .cnt{background:var(--blue-pale);color:var(--blue-700)}

/* ---------- Panels ---------- */
.panel{background:var(--white);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:18px}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.panel-head h3{font-size:16px;font-weight:700;flex:1}
.panel-head .ico-wrap{width:34px;height:34px;border-radius:9px;background:var(--blue-pale);display:flex;align-items:center;justify-content:center}
.panel-head .ico-wrap svg{width:17px;height:17px;stroke:var(--blue-600)}
.panel-body{padding:20px}
.panel-body.flush{padding:0}

/* ---------- Stat tiles ---------- */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-tile{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)}
.stat-tile .l{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.stat-tile .l svg{width:14px;height:14px;stroke:var(--blue)}
.stat-tile .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;color:var(--ink)}
.stat-tile .v.sm{font-size:18px}
.stat-tile .x{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}

/* ---------- Tables ---------- */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  padding:11px 14px;background:var(--blue-pale2);border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--ink-2)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--blue-pale2)}
td b{color:var(--ink);font-weight:700}
.t-right{text-align:right}
.cell-actions{display:flex;gap:6px;justify-content:flex-end}

/* ---------- Pills / tags ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.pill-blue{background:var(--blue-pale);color:var(--blue-700)}
.pill-green{background:var(--green-pale);color:var(--green)}
.pill-amber{background:var(--amber-pale);color:var(--amber)}
.pill-red{background:var(--red-pale);color:var(--red)}
.pill-gray{background:var(--bg);color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ---------- Forms ---------- */
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.field .hint{font-weight:500;color:var(--muted-2);font-size:11px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line-2);
  border-radius:var(--r-sm);background:var(--white);color:var(--ink);transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-pale)}
.field textarea{resize:vertical;min-height:72px}
.frow{display:grid;gap:14px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(15,25,45,.5);backdrop-filter:blur(4px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:100;
  overflow-y:auto;animation:fade .2s}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:580px;box-shadow:var(--shadow-lg);
  animation:pop .26s cubic-bezier(.2,.9,.3,1.3);margin:auto 0}
.modal.wide{max-width:760px}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{padding:22px 26px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal-head h2{font-size:21px;font-weight:800;flex:1}
.modal-head .step{font-size:12px;font-weight:700;color:var(--blue-600);background:var(--blue-pale);padding:5px 11px;border-radius:20px}
.modal-body{padding:24px 26px;max-height:62vh;overflow-y:auto}
.modal-foot{padding:16px 26px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;align-items:center}
.modal-foot .fill{flex:1}
.x-close{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.x-close:hover{background:var(--red-pale)}
.x-close svg{width:18px;height:18px;stroke:var(--ink-2)}

/* ---------- Country / sections ---------- */
.country-block{border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden;background:var(--white);box-shadow:var(--shadow-sm)}
.country-head{padding:14px 18px;background:linear-gradient(100deg,var(--blue-700),var(--blue));color:#fff;display:flex;align-items:center;gap:12px}
.country-head .flag{font-size:24px}
.country-head .ci{flex:1}
.country-head h3{font-size:17px;font-weight:700;color:#fff}
.country-head .meta{font-size:12px;opacity:.9;font-weight:600}
.country-head .icon-btn{background:rgba(255,255,255,.18);border-color:transparent}
.country-head .icon-btn svg{stroke:#fff}
.country-head .icon-btn:hover{background:rgba(255,255,255,.3)}
.section-list{padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.sec-item{border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:var(--r-sm);padding:13px 15px;
  display:flex;align-items:center;gap:14px;transition:.15s;background:var(--blue-pale2)}
.sec-item:hover{border-color:var(--blue-light);box-shadow:var(--shadow-sm)}
.sec-item .si-main{flex:1;min-width:0}
.sec-item .si-act{font-weight:700;font-size:14.5px;color:var(--ink);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.sec-item .si-sub{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;gap:14px;flex-wrap:wrap}
.sec-item .si-sub span{display:flex;align-items:center;gap:4px}
.add-inline{display:flex;align-items:center;gap:8px;color:var(--blue-600);font-weight:700;font-size:13px;
  padding:9px 14px;border:1px dashed var(--line-2);border-radius:var(--r-sm);transition:.15s;width:100%;justify-content:center}
.add-inline:hover{border-color:var(--blue);background:var(--blue-pale2)}
.add-inline svg{width:15px;height:15px;stroke:var(--blue-600)}

/* ---------- Tasks ---------- */
.task-item{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--line);transition:.15s}
.task-item:hover{background:var(--blue-pale2)}
.task-item:last-child{border-bottom:none}
.chk{width:21px;height:21px;border-radius:7px;border:2px solid var(--line-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;background:#fff}
.chk:hover{border-color:var(--blue)}
.chk.on{background:var(--green);border-color:var(--green)}
.chk svg{width:13px;height:13px;stroke:#fff;stroke-width:3.5;opacity:0}
.chk.on svg{opacity:1}
.task-main{flex:1;min-width:0}
.task-title{font-weight:600;font-size:14px;color:var(--ink)}
.task-title.done{text-decoration:line-through;color:var(--muted-2)}
.task-meta{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;display:flex;gap:10px}

/* ---------- Reimburse ---------- */
.reimb-card{border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;background:var(--white);box-shadow:var(--shadow-sm)}
.reimb-card .rc-head{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-700));
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;font-family:'Bricolage Grotesque';flex-shrink:0}
.rc-head .nm{font-weight:700;font-size:15px}
.rc-head .ct{font-size:12px;color:var(--muted);font-weight:600}
.rc-total{margin-left:auto;text-align:right}
.rc-total .big{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;color:var(--green)}
.rc-total .lbl{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
.reimb-convert{background:var(--blue-pale2);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.reimb-convert .field{margin:0;flex:1;min-width:120px}
.reimb-result{background:var(--ink);color:#fff;border-radius:var(--r-sm);padding:11px 16px;min-width:160px}
.reimb-result .lbl{font-size:10.5px;opacity:.7;font-weight:700;text-transform:uppercase}
.reimb-result .amt{font-family:'Bricolage Grotesque';font-weight:800;font-size:21px}

.help{background:var(--blue-pale2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 15px;
  font-size:12.5px;color:var(--ink-2);display:flex;gap:10px;margin-bottom:16px;line-height:1.55}
.help svg{width:16px;height:16px;stroke:var(--blue);flex-shrink:0;margin-top:1px}
.help b{color:var(--blue-700)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:13.5px;
  box-shadow:var(--shadow-lg);z-index:200;transition:.3s cubic-bezier(.2,.9,.3,1.2);display:flex;align-items:center;gap:9px;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:17px;height:17px;stroke:var(--blue-light)}

.maps-link{display:inline-flex;align-items:center;gap:5px;color:var(--blue-600);font-weight:700;font-size:12.5px}
.maps-link svg{width:14px;height:14px;stroke:var(--blue-600)}
.maps-link:hover{color:var(--blue-700)}

.muted{color:var(--muted)}
.center{text-align:center}
@media(max-width:880px){
  .sidebar{position:fixed;left:-260px;transition:.25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}
  .menu-btn{display:flex!important}
  .frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}
  .content{padding:20px}
}
.menu-btn{display:none;width:38px;height:38px;border-radius:9px;align-items:center;justify-content:center;background:var(--white);border:1px solid var(--line)}
.menu-btn svg{width:20px;height:20px;stroke:var(--ink)}

/* ---- Cronograma: tarjetas de día ---- */
.day-card{border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;background:var(--white);box-shadow:var(--shadow-sm);overflow:hidden}
.day-head{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--blue-pale2);border-bottom:1px solid var(--line)}
.day-date{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:var(--ink)}
.day-dow{font-size:11.5px;color:var(--muted);font-weight:700}
.day-body{padding:13px 16px;display:flex;flex-direction:column;gap:9px}
.day-logi{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.day-logi .li{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:5px 12px}
.day-logi .li .muted{font-weight:500}
.flight-item{display:flex;align-items:center;gap:12px;border:1px solid var(--blue-light);background:linear-gradient(100deg,var(--blue-pale),#fff);border-radius:var(--r-sm);padding:11px 14px}
.flight-item .fi-route{font-weight:700;color:var(--ink);font-size:14px}
.flight-item .fi-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.flight-ico{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}

/* ---- Perfil del estudiante ---- */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0}
.pf-group{border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;margin:0 0 12px}
.pf-group h4{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--blue-700);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.pf-rows{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px}
.pf-row{font-size:13px}
.pf-row .k{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.pf-row .v{color:var(--ink);font-weight:600}
.pf-row .v.empty{color:var(--muted-2);font-weight:500}
.pf-head{display:flex;align-items:center;gap:15px;margin-bottom:16px}
.pf-avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-700));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;font-family:'Bricolage Grotesque';flex-shrink:0}
.pf-head h2{font-size:23px;font-weight:800}
.pf-head .pf-meta{font-size:13px;color:var(--muted);font-weight:600}
@media(max-width:560px){.pf-rows{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <svg width="34" height="34" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="44" fill="#A9CBED" stroke="#15181D" stroke-width="5"/>
        <path d="M50 6 C30 26 30 74 50 94 M50 6 C70 26 70 74 50 94" stroke="#15181D" stroke-width="3.2" fill="none"/>
        <path d="M8 42 H92 M10 60 H90" stroke="#15181D" stroke-width="3.2" fill="none"/>
        <path d="M30 28 q14 6 26 0 q10 -4 18 2 l-4 12 q-12 -2 -20 4 q-12 4 -22 -2 z" fill="#5B9BD5" stroke="#15181D" stroke-width="2.4"/>
        <path d="M34 64 q16 -4 28 4 l-3 12 q-14 4 -26 -4 z" fill="#5B9BD5" stroke="#15181D" stroke-width="2.4"/>
      </svg>
      <div class="logo-text">Primera<span class="b">Global</span></div>
    </div>
    <nav class="nav" id="topNav">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="newprog">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
        Nuevo programa
      </button>
    </nav>
    <div id="progNav"></div>
    <div class="sidebar-foot">
      <div class="io-btns">
        <button onclick="exportData()">⬇ Exportar</button>
        <button onclick="document.getElementById('importFile').click()">⬆ Importar</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      <div>PrimeraGlobal · Planeación © 2025</div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="crumb" id="crumb">Dashboard</div>
      <div class="topbar-spacer"></div>
      <div id="syncStatus" class="pill pill-gray" style="cursor:pointer;margin-right:6px" onclick="changeUser()"></div>
      <div id="topbarAction"></div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== STATE & STORAGE ===================== */
/* ╔══════════════════════════════════════════════════════════════╗
   ║  CONFIGURACIÓN DEL EQUIPO                                      ║
   ║  Pega aquí la URL de tu backend (la que termina en /exec).     ║
   ║  Si la dejas vacía, la app funciona en modo local (solo este   ║
   ║  navegador). Con la URL puesta, todo el equipo se sincroniza.  ║
   ╚══════════════════════════════════════════════════════════════╝ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyr5EFh0_BWu3QDgqHqm1UAITBZnTWsAg1QC7B45TUEm8YqIaSxSau1duooosSiCtJ8/exec"; // <-- PEGA AQUÍ TU URL ENTRE LAS COMILLAS

const STORE_KEY='primeraglobal:programs:v1';
const NAME_KEY='primeraglobal:user';
let state={programs:[]};
let cur={view:'dashboard', programId:null, tab:'resumen'};
let storageOK=true;
let lastSync=null;        // marca de tiempo del último dato conocido del servidor
let syncing=false;        // hay un guardado en curso
let saveTimer=null;       // debounce de guardado
let userName='';          // quién está editando (para mostrar al equipo)
const REMOTE = !!BACKEND_URL;

const FLAGS={ // helper para mostrar bandera por país (opcional, fallback 🌎)
  'colombia':'🇨🇴','méxico':'🇲🇽','mexico':'🇲🇽','brasil':'🇧🇷','brazil':'🇧🇷','perú':'🇵🇪','peru':'🇵🇪',
  'argentina':'🇦🇷','chile':'🇨🇱','ecuador':'🇪🇨','costa rica':'🇨🇷','panamá':'🇵🇦','panama':'🇵🇦',
  'guatemala':'🇬🇹','uruguay':'🇺🇾','bolivia':'🇧🇴','españa':'🇪🇸','estados unidos':'🇺🇸','usa':'🇺🇸',
  'paraguay':'🇵🇾','venezuela':'🇻🇪','república dominicana':'🇩🇴','cuba':'🇨🇺','nicaragua':'🇳🇮','honduras':'🇭🇳'
};
const CATS=['Alojamiento','Transporte','Alimentación','Actividades','Materiales','Seguros','Comunicación','Imprevistos','Otros'];
const CURRENCIES=['USD','COP','MXN','BRL','PEN','ARS','CLP','EUR','GTQ','CRC','UYU','PYG'];

function flagFor(name){ if(!name) return '🌎'; const k=name.trim().toLowerCase(); return FLAGS[k]||'🌎'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(n){ return (Number(n)||0).toLocaleString('es-CO',{maximumFractionDigits:2}); }
function fmtUSD(n){ return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fdate(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
function daysBetween(a,b){ if(!a||!b) return 0; return Math.round((new Date(b)-new Date(a))/86400000)+1; }

/* ---- Validaciones de campos / fechas (jerarquía) ---- */
function checkRequired(fields){
  document.querySelectorAll('.modal input,.modal select,.modal textarea').forEach(el=>el.style.borderColor='');
  for(const [id,label] of fields){ const el=document.getElementById(id);
    if(el && !el.value.trim()){ toast('⚠ Completa: '+label); el.style.borderColor='var(--red)'; el.focus(); return false; } }
  return true;
}
function checkRange(id,minD,maxD,label){
  const el=document.getElementById(id); const d=el?el.value:''; if(!d) return true;
  if(minD && d<minD){ toast('⚠ '+label+' debe ser desde el '+fdate(minD)); el.style.borderColor='var(--red)'; el.focus(); return false; }
  if(maxD && d>maxD){ toast('⚠ '+label+' debe ser hasta el '+fdate(maxD)); el.style.borderColor='var(--red)'; el.focus(); return false; }
  return true;
}
function checkOrder(startId,endId,label){
  const s=(document.getElementById(startId)||{}).value, e=(document.getElementById(endId)||{}).value;
  if(s&&e&&e<s){ toast('⚠ '+label+': la fecha de fin no puede ser antes del inicio'); return false; }
  return true;
}

/* ---- Almacenamiento adaptativo ----
   REMOTO (BACKEND_URL puesta): Google Apps Script -> todo el equipo comparte datos.
   LOCAL (sin URL): localStorage o el storage de Claude (solo este navegador). */
const hasClaudeStore=(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
const Local={
  async get(k){
    if(hasClaudeStore){ try{ const r=await window.storage.get(k); return r&&r.value?r.value:null; }catch(e){ return null; } }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(hasClaudeStore){ await window.storage.set(k,v); return; }
    localStorage.setItem(k,v);
  }
};

/* ---- carga inicial ---- */
async function loadState(){
  if(REMOTE){
    setSync('loading');
    try{
      const r=await fetch(BACKEND_URL,{method:'GET',redirect:'follow'});
      const j=await r.json();
      state=(j&&j.data)?j.data:{programs:[]};
      lastSync=j&&j.updatedAt?j.updatedAt:null;
      setSync('ok', j&&j.by);
    }catch(e){ setSync('off'); toast('⚠ Sin conexión con el servidor — revisa la URL'); }
  }else{
    try{ const v=await Local.get(STORE_KEY); if(v) state=JSON.parse(v); }catch(e){ storageOK=false; }
    setSync('local');
  }
  if(!state.programs) state.programs=[];
  normalizeAll();
}

/* ---- guardar (se llama en cada cambio) ---- */
async function save(){
  render();
  if(REMOTE){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(pushRemote, 350); // debounce: agrupa cambios rápidos
  }else{
    try{ await Local.set(STORE_KEY, JSON.stringify(state)); }
    catch(e){ storageOK=false; toast('⚠ No se pudo guardar'); }
  }
}
async function pushRemote(){
  syncing=true; setSync('saving');
  try{
    const r=await fetch(BACKEND_URL,{
      method:'POST', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain evita el bloqueo CORS
      body: JSON.stringify({ data: state, by: userName })
    });
    const j=await r.json();
    if(j&&j.ok){ lastSync=j.updatedAt; setSync('ok'); }
    else { setSync('off'); toast('⚠ No se pudo guardar en el servidor'); }
  }catch(e){ setSync('off'); toast('⚠ Sin conexión al guardar'); }
  syncing=false;
}

/* ---- polling: trae cambios de otros cada pocos segundos ---- */
async function pollRemote(){
  if(!REMOTE || syncing) return;
  if(document.querySelector('.overlay')) return; // no refrescar si hay un formulario abierto
  try{
    const r=await fetch(BACKEND_URL,{method:'GET',redirect:'follow'});
    const j=await r.json();
    if(j&&j.updatedAt && j.updatedAt!==lastSync){
      state=j.data||{programs:[]}; if(!state.programs) state.programs=[]; normalizeAll();
      lastSync=j.updatedAt; render();
      setSync('ok', j.by);
      if(j.by && j.by!==userName) toast('🔄 Actualizado por '+j.by);
    }else{ setSync('ok'); }
  }catch(e){ setSync('off'); }
}

/* ---- indicador de estado de sincronización ---- */
function setSync(st, by){
  const el=document.getElementById('syncStatus'); if(!el) return;
  const map={
    loading:['pill-gray','◌ Cargando…'],
    saving :['pill-amber','⟳ Guardando…'],
    ok     :['pill-green','● En vivo'+(userName?' · '+esc(userName):'')],
    off    :['pill-red','● Sin conexión'],
    local  :['pill-gray','● Modo local']
  };
  const [cls,txt]=map[st]||map.ok;
  el.className='pill '+cls;
  el.innerHTML=txt;
  el.title=lastSync?('Última actualización: '+new Date(lastSync).toLocaleString('es-CO')):'';
}

/* ---- identidad del usuario (para que el equipo sepa quién edita) ---- */
async function ensureUser(){
  if(!REMOTE) return;
  userName=(await Local.get(NAME_KEY))||'';
  if(!userName){
    const n=prompt('Tu nombre (para que el equipo sepa quién hace cada cambio):','');
    userName=(n&&n.trim())?n.trim():'Anónimo';
    await Local.set(NAME_KEY,userName);
  }
}
async function changeUser(){
  const n=prompt('Tu nombre:',userName);
  if(n&&n.trim()){ userName=n.trim(); await Local.set(NAME_KEY,userName); setSync('ok'); }
}
/* ---- normalización / migración de datos (no pierde info de versiones previas) ---- */
function normalizeProgram(p){
  p.countries=p.countries||[]; p.sections=p.sections||[]; p.budget=p.budget||[];
  p.expenses=p.expenses||[]; p.tasks=p.tasks||[]; p.participants=p.participants||[];
  p.flights=p.flights||[];
  if(!p.student||typeof p.student!=='object') p.student={};
  if(!Array.isArray(p.schedule)) p.schedule=[];
  p.schedule.forEach(d=>{
    if(!d.activities){                       // formato viejo: una sola actividad por día
      d.activities=[];
      if(d.activity) d.activities.push({id:uid(),time:'',name:d.activity,location:d.location||'',notes:''});
    }
    delete d.activity; delete d.location;    // ya migrado a activities[]
    d.accommodation=d.accommodation||''; d.transport=d.transport||''; d.responsible=d.responsible||''; d.notes=d.notes||'';
  });
}
function normalizeAll(){ (state.programs||[]).forEach(normalizeProgram); }
function getProg(){ return state.programs.find(p=>p.id===cur.programId); }

/* ===================== RENDER ROUTER ===================== */
function render(){
  renderNav();
  const c=document.getElementById('content');
  const action=document.getElementById('topbarAction');
  action.innerHTML='';
  if(cur.view==='dashboard'){ document.getElementById('crumb').innerHTML='Dashboard'; c.innerHTML=viewDashboard(); }
  else if(cur.view==='program'){
    const p=getProg(); if(!p){ cur.view='dashboard'; return render(); }
    document.getElementById('crumb').innerHTML=`Dashboard / <b>${esc(p.name)}</b>`;
    c.innerHTML=viewProgram(p);
  }
  window.scrollTo(0,0);
}

function renderNav(){
  document.querySelectorAll('#topNav .nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.view==='dashboard' && cur.view==='dashboard');
  });
  const pn=document.getElementById('progNav');
  if(!state.programs.length){ pn.innerHTML=''; return; }
  pn.innerHTML=`<div class="nav-label">Programas</div>`+state.programs.map(p=>`
    <button class="nav-item ${cur.view==='program'&&cur.programId===p.id?'active':''}" onclick="openProg('${p.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
      ${esc(p.name)}
    </button>`).join('');
}

/* ===================== DASHBOARD ===================== */
function viewDashboard(){
  if(!state.programs.length){
    return `<div class="page-head"><div class="ph-text"><h1>Tus programas</h1>
      <div class="sub">Centraliza la planeación de cada experiencia de intercambio.</div></div></div>
      <div class="empty"><div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg></div>
        <h3>Aún no tienes programas</h3>
        <p>Crea tu primer programa de intercambio. Te pediré la información general — fechas, países y participantes — para armar la base.</p>
        <button class="btn btn-blue" onclick="openNewProgram()" style="margin:0 auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Crear primer programa</button>
      </div>`;
  }
  const cards=state.programs.map(p=>{
    const stats=progStats(p);
    const flags=p.countries.slice(0,4).map(co=>`<span class="flag-chip">${flagFor(co.name)} ${esc(co.name)}</span>`).join('')
      +(p.countries.length>4?`<span class="flag-chip">+${p.countries.length-4}</span>`:'');
    return `<div class="prog-card" onclick="openProg('${p.id}')">
      <div class="pc-banner">
        <svg class="globe-deco" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="46" stroke="#fff" stroke-width="3"/><path d="M50 4 C28 28 28 72 50 96 M50 4 C72 28 72 72 50 96 M4 42H96 M6 60H94" stroke="#fff" stroke-width="2.4"/></svg>
        <div class="pc-flags">${flags||'<span class="flag-chip">🌎 Sin países</span>'}</div>
      </div>
      <div class="pc-body">
        <h3>${esc(p.name)}</h3>
        <div class="pc-meta">📅 ${fdate(p.startDate)} — ${fdate(p.endDate)} · ${stats.days} días</div>
        <div class="pc-stats">
          <div class="pc-stat"><div class="n">${p.countries.length}</div><div class="l">Países</div></div>
          <div class="pc-stat"><div class="n">${stats.scheduled}</div><div class="l">Activid.</div></div>
          <div class="pc-stat"><div class="n">${(p.flights||[]).length}</div><div class="l">Vuelos</div></div>
          <div class="pc-stat"><div class="n">${stats.openTasks}</div><div class="l">Tareas</div></div>
        </div>
      </div></div>`;
  }).join('');
  return `<div class="page-head"><div class="ph-text"><h1>Tus programas</h1>
      <div class="sub">${state.programs.length} programa${state.programs.length!==1?'s':''} en planeación.</div></div>
      <button class="btn btn-blue" onclick="openNewProgram()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Nuevo programa</button></div>
    <div class="grid cards">${cards}
      <div class="new-card" onclick="openNewProgram()"><div class="plus"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></div>Agregar programa</div>
    </div>`;
}

function progStats(p){
  const days=daysBetween(p.startDate,p.endDate);
  const scheduled=(p.schedule||[]).reduce((n,d)=>n+((d.activities||[]).length),0);
  const openTasks=p.tasks.filter(t=>!t.done).length;
  let spentUSD=0; p.expenses.forEach(e=>spentUSD+=expUSD(e));
  let plannedUSD=0; p.budget.forEach(b=>plannedUSD+=budgetUSD(b));
  return {days,scheduled,openTasks,spentUSD,plannedUSD};
}

/* ===================== PROGRAM VIEW ===================== */
const TABS=[
  ['resumen','Resumen'],
  ['estudiante','Estudiante'],
  ['paises','Países y Secciones'],
  ['cronograma','Cronograma'],
  ['presupuesto','Presupuesto'],
  ['gastos','Gastos reales'],
  ['reembolsos','Reembolsos'],
  ['tareas','Tareas']
];
function viewProgram(p){
  const acts=(p.schedule||[]).reduce((n,d)=>n+((d.activities||[]).length),0);
  const counts={paises:p.countries.length,cronograma:acts,presupuesto:p.budget.length,
    gastos:p.expenses.length,tareas:p.tasks.filter(t=>!t.done).length};
  const tabs=TABS.map(([id,label])=>`<button class="tab ${cur.tab===id?'active':''}" onclick="setTab('${id}')">${label}${counts[id]!==undefined?`<span class="cnt">${counts[id]}</span>`:''}</button>`).join('');
  return `<div class="page-head"><div class="ph-text">
      <h1>${esc(p.name)}</h1>
      <div class="sub">${p.countries.map(c=>flagFor(c.name)+' '+esc(c.name)).join('  ·  ')||'Sin países aún'} · ${fdate(p.startDate)} — ${fdate(p.endDate)}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="openProgramForm('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg>Editar info</button>
      <button class="btn btn-danger-ghost btn-sm" onclick="deleteProgram('${p.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
    </div>
    <div class="tabs">${tabs}</div>
    <div id="tabContent">${renderTab(p)}</div>`;
}
function renderTab(p){
  switch(cur.tab){
    case 'resumen': return tabResumen(p);
    case 'paises': return tabPaises(p);
    case 'cronograma': return tabCronograma(p);
    case 'presupuesto': return tabPresupuesto(p);
    case 'gastos': return tabGastos(p);
    case 'reembolsos': return tabReembolsos(p);
    case 'tareas': return tabTareas(p);
    case 'estudiante': return tabEstudiante(p);
  }
}
function setTab(t){ cur.tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.getAttribute('onclick').includes(`'${t}'`))); document.getElementById('tabContent').innerHTML=renderTab(getProg()); }

/* ---------- RESUMEN ---------- */
function tabResumen(p){
  const s=progStats(p);
  const budgetPct=s.plannedUSD>0?Math.min(100,Math.round(s.spentUSD/s.plannedUSD*100)):0;
  return `
  <div class="stat-row">
    <div class="stat-tile"><div class="l">🗓 Duración</div><div class="v">${s.days}</div><div class="x">días · ${fdate(p.startDate)} → ${fdate(p.endDate)}</div></div>
    <div class="stat-tile"><div class="l">🌎 Países</div><div class="v">${p.countries.length}</div><div class="x">${p.sections.length} secciones planeadas</div></div>

/* ---------- CRONOGRAMA ---------- */
/* ---------- CRONOGRAMA ---------- */
function dow(dstr){ try{ const d=new Date(dstr+'T00:00'); return ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][d.getDay()]; }catch(e){ return ''; } }
function eachDate(start,end){ const out=[]; if(!start||!end) return out; let d=new Date(start+'T00:00'); const e=new Date(end+'T00:00'); let guard=0; while(d<=e && guard<3660){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); guard++; } return out; }
function countryForDate(p,date){ const c=p.countries.find(c=>c.startDate&&c.endDate&&date>=c.startDate&&date<=c.endDate); return c?c.id:''; }
function ensureDays(p){
  if(!Array.isArray(p.schedule)) p.schedule=[];
  const dates=eachDate(p.startDate,p.endDate); const set=new Set(dates);
  p.schedule=p.schedule.filter(d=>set.has(d.date));            // quitar días fuera de rango
  dates.forEach(dt=>{
    let day=p.schedule.find(d=>d.date===dt);
    if(!day){ day={id:'d'+dt,date:dt,countryId:countryForDate(p,dt),accommodation:'',transport:'',responsible:'',notes:'',activities:[]}; p.schedule.push(day); }
    if(!day.countryId) day.countryId=countryForDate(p,dt);
    if(!day.activities) day.activities=[];
  });
  p.schedule.sort((a,b)=>a.date.localeCompare(b.date));
}
function mapsLink(q,label){ const u=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
  return `<a class="maps-link" target="_blank" href="${u}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${esc(label||q)}</a>`; }
function activityRow(dayId,a){
  return `<div class="sec-item">
    <div class="si-main"><div class="si-act">${a.time?`<span class="pill pill-blue" style="padding:1px 9px">${esc(a.time)}</span> `:''}${esc(a.name)}</div>
      <div class="si-sub">${a.location?mapsLink(a.location):''}${a.notes?`<span>📝 ${esc(a.notes)}</span>`:''}</div></div>
    <button class="icon-btn" onclick="openActForm('${dayId}','${a.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg></button>
    <button class="icon-btn del" onclick="delAct('${dayId}','${a.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div>`;
}
function flightItem(f){
  return `<div class="flight-item"><div class="flight-ico">✈</div>
    <div style="flex:1"><div class="fi-route">${esc(f.fromCity||f.fromAirport||'—')} → ${esc(f.toCity||f.toAirport||'—')}${f.flightNo?` · ${esc(f.flightNo)}`:''}</div>
      <div class="fi-sub">${f.airline?esc(f.airline)+' · ':''}${f.depTime?'Sale '+esc(f.depTime):''}${f.arrTime?' · Llega '+esc(f.arrTime):''}${f.confirmation?' · Conf. '+esc(f.confirmation):''}</div></div>
    <button class="icon-btn" onclick="openFlightForm('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg></button>
    <button class="icon-btn del" onclick="delFlight('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div>`;
}
function tabCronograma(p){
  ensureDays(p);
  const flights=[...(p.flights||[])].sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.depTime||'').localeCompare(b.depTime||''));

      +flights.map(f=>`<tr><td><b>${fdate(f.date)}</b></td>

        <td class="t-right"><div class="cell-actions">
          <button class="icon-btn" onclick="openFlightForm('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg></button>
          <button class="icon-btn del" onclick="delFlight('${f.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div></td></tr>`).join('')
      +`</tbody></table></div>`
    : `<div class="center muted" style="padding:18px">Sin vuelos. Al agregarlos aparecen aquí y también dentro de su día en el cronograma.</div>`;
  const flightPanel=`<div class="panel"><div class="panel-head"><div class="ico-wrap"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5a2.1 2.1 0 00-3-3L13 8 4.8 6.2a.5.5 0 00-.5.8L8 11l-3 3H3l1.5 2.5L7 18l2-3 3 3.8.8-.5z"/></svg></div><h3>Vuelos del programa</h3>
      <button class="btn btn-blue btn-sm" onclick="openFlightForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Agregar vuelo</button></div>
      <div class="panel-body flush">${flightTable}</div></div>`;
  const days=p.schedule.map(d=>{
    const co=p.countries.find(c=>c.id===d.countryId);
    const dayFlights=flights.filter(f=>f.date===d.date);

        <button class="btn btn-ghost btn-sm" onclick="openDayLogi('${d.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg>Logística</button></div>
      <div class="day-body">

      </div></div>`;
  }).join('');
  return `<div class="help"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>

    ${flightPanel}
    <div class="panel-head" style="padding:0 2px 12px"><h3 style="font-size:17px">Día a día</h3></div>
    ${days||'<div class="center muted" style="padding:30px">Define las fechas del programa para generar los días.</div>'}`;
}

/* ---------- PRESUPUESTO ---------- */
function budgetUSD(b){ if(b.currency==='USD'||!b.rate) return b.currency==='USD'?Number(b.amount)||0:0; return (Number(b.amount)||0)/Number(b.rate); }
function tabPresupuesto(p){
  const byCat={};
  p.budget.forEach(b=>{ byCat[b.category]=(byCat[b.category]||0)+budgetUSD(b); });
  let total=0; p.budget.forEach(b=>total+=budgetUSD(b));
  let spent=0; p.expenses.forEach(e=>spent+=expUSD(e));
  const rows=p.budget.length?p.budget.map(b=>`<tr>
      <td><span class="pill pill-blue">${esc(b.category)}</span></td>
      <td><b>${esc(b.concept)}</b></td>
      <td>${esc(b.country)||'<span class="muted">General</span>'}</td>
      <td>${fmt(b.amount)} ${esc(b.currency)}${b.currency!=='USD'&&b.rate?`<div class="task-meta">tasa ${fmt(b.rate)}</div>`:''}</td>
      <td><b>${fmtUSD(budgetUSD(b))}</b></td>
      <td class="t-right"><div class="cell-actions">
        <button class="icon-btn" onclick="openBudgetForm('${b.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4z"/></svg></button>
        <button class="icon-btn del" onclick="delBudget('${b.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div></td></tr>`).join(''):`<tr><td colspan="6" class="center muted" style="padding:30px">Sin rubros de presupuesto.</td></tr>`;
  const catBars=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>{
    const pct=total>0?Math.round(v/total*100):0;
    return `<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:4px"><span>${esc(c)}</span><span>${fmtUSD(v)} · ${pct}%</span></div>
      <div style="height:8px;background:var(--bg);border-radius:20px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--blue),var(--blue-700));border-radius:20px"></div></div></div>`;
  }).join('')||'<div class="muted center">Sin datos</div>';
  return `<div class="stat-row">
      <div class="stat-tile"><div class="l">💵 Presupuesto total</div><div class="v sm">${fmtUSD(total)}</div></div>
      <div class="stat-tile"><div class="l">🧾 Gastado real</div><div class="v sm">${fmtUSD(spent)}</div></div>
      <div class="stat-tile"><div class="l">📊 Disponible</div><div class="v sm" style="color:${total-spent<0?'var(--red)':'var(--green)'}">${fmtUSD(total-spent)}</div></div>
    </div>
    <div class="panel"><div class="panel-head"><div class="ico-wrap"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></div><h3>Distribución por categoría</h3></div><div class="panel-body">${catBars}</div></div>
    <div class="panel"><div class="panel-head"><div class="ico-wrap"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><h3>Rubros del presupuesto</h3>
      <button class="btn btn-blue btn-sm" onclick="openBudgetForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Agregar rubro</button></div>
      <div class="panel-body flush"><div class="tbl-wrap"><table><thead><tr><th>Categoría</th><th>Concepto</th><th>País</th><th>Monto local</th><th>En USD</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;
}

/* ---------- GASTOS REALES ---------- */
function expUSD(e){ if(e.currency==='USD') return Number(e.amount)||0; if(!e.rate||Number(e.rate)===0) return 0; return (Number(e.amount)||0)/Number(e.rate); }
function tabGastos(p){
  const rows=[...p.expenses].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const body=rows.length?rows.map(e=>`<tr>
      <td><b>${fdate(e.date)}</b></td>
      <td><span class="pill pill-blue">${esc(e.category)}</span></td>
      <td><b>${esc(e.concept)}</b>${e.country?`<div class="task-meta">${esc(e.country)}</div>`:''}</td>
      <td>${esc(e.paidBy)||'<span class="muted">—</span>'}</td>

        <button class="icon-btn del" onclick="delExpense('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div></td></tr>`).join(''):`<tr><td colspan="7" class="center muted" style="padding:30px">Sin gastos registrados.</td></tr>`;
  return `<div class="help"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <div>Registra cada gasto en su <b>moneda local</b> con la <b>tasa del día</b> (cuántas unidades locales equivalen a 1 USD). El sistema calcula el valor en USD y lo asigna a quien pagó, para los reembolsos.</div></div>
    <div class="stat-row"><div class="stat-tile"><div class="l">🧾 Total gastado</div><div class="v sm">${fmtUSD(total)}</div><div class="x">${rows.length} movimientos</div></div></div>
    <div class="panel"><div class="panel-head"><div class="ico-wrap"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg></div><h3>Registro de gastos</h3>
      <button class="btn btn-blue btn-sm" onclick="openExpenseForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Registrar gasto</button></div>
      <div class="panel-body flush"><div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Categoría</th><th>Concepto</th><th>Pagó</th><th>Monto local</th><th>En USD</th><th></th></tr></thead><tbody>${body}</tbody></table></div></div></div>`;
}

/* ---------- REEMBOLSOS ---------- */
function tabReembolsos(p){
  const byPerson={};
  p.expenses.forEach(e=>{ const k=(e.paidBy||'Sin asignar').trim(); if(!byPerson[k]) byPerson[k]={usd:0,items:[]}; byPerson[k].usd+=expUSD(e); byPerson[k].items.push(e); });
  const people=Object.entries(byPerson);
  if(!people.length) return `<div class="empty"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8z"/></svg></div><h3>Aún no hay gastos para reembolsar</h3><p>Registra gastos en la pestaña <b>Gastos reales</b> indicando quién pagó. Aquí calcularé cuánto reembolsar a cada persona.</p></div>`;
  const cards=people.sort((a,b)=>b[1].usd-a[1].usd).map(([name,d],i)=>{
    const init=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const opts=CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('');
    const id='reimb'+i;
    return `<div class="reimb-card">
      <div class="rc-head"><div class="avatar">${esc(init)||'?'}</div>
        <div><div class="nm">${esc(name)}</div><div class="ct">${d.items.length} gasto${d.items.length!==1?'s':''} pagado${d.items.length!==1?'s':''}</div></div>

      </div>
      <div class="reimb-convert">
        <div class="field"><label>Reembolsar en</label><select id="${id}cur" onchange="calcReimb('${id}',${d.usd})">${opts}</select></div>
        <div class="field"><label>Tasa <span class="hint">(1 USD = ? )</span></label><input type="number" id="${id}rate" value="1" step="any" oninput="calcReimb('${id}',${d.usd})"></div>
        <div class="reimb-result"><div class="lbl">Monto a entregar</div><div class="amt" id="${id}out">${fmtUSD(d.usd)}</div></div>
      </div></div>`;
  }).join('');

      <div>Cada persona acumula sus gastos convertidos a <b>USD</b>. Elige la <b>moneda en que pides el reembolso</b> y su tasa, y te digo el monto exacto a entregar.</div></div>${cards}`;
}
function calcReimb(id,usd){
  const cur=document.getElementById(id+'cur').value;
  const rate=Number(document.getElementById(id+'rate').value)||1;
  const out=document.getElementById(id+'out');
  const val=usd*rate;
  out.textContent=(cur==='USD'?fmtUSD(val):fmt(val)+' '+cur);
}

function openProgramForm(id){

function syncProgRange(){
  const s=val('pf_start'), e=val('pf_end');
  document.querySelectorAll('#pf_countries .cr_start, #pf_countries .cr_end').forEach(inp=>{ inp.min=s||''; inp.max=e||''; });
}
function countryRow(c,i){
  const opts=`<option value="">Moneda</option>`+CURRENCIES.map(x=>`<option value="${x}" ${c.currency===x?'selected':''}>${x}</option>`).join('');
  return `<div class="frow c4" data-crow style="align-items:end;margin-bottom:10px">
    <div class="field" style="margin:0"><label>País *</label><input class="cr_name" value="${esc(c.name||'')}" placeholder="México"></div>
    <div class="field" style="margin:0"><label>Moneda *</label><select class="cr_cur">${opts}</select></div>
    <div class="field" style="margin:0"><label>Desde *</label><input type="date" class="cr_start" value="${c.startDate||''}"></div>
    <div class="field" style="margin:0;display:flex;gap:6px;align-items:end"><div style="flex:1"><label>Hasta *</label><input type="date" class="cr_end" value="${c.endDate||''}"></div><button class="icon-btn del" onclick="this.closest('[data-crow]').remove()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div>
  </div>`;

function addCountryRow(){ const w=document.getElementById('pf_countries'); w.insertAdjacentHTML('beforeend',countryRow({},w.children.length)); syncProgRange(); }
function saveProgram(id){
  if(!checkRequired([['pf_name','Nombre del programa'],['pf_start','Fecha de inicio'],['pf_end','Fecha de fin'],['pf_coord','Coordinador general'],['pf_phone','Teléfono / contacto']])) return;
  if(!checkOrder('pf_start','pf_end','Programa')) return;
  const ps=val('pf_start'), pe=val('pf_end');
  const rowEls=[...document.querySelectorAll('#pf_countries [data-crow]')];
  const rows=[];
  for(const r of rowEls){
    const nm=r.querySelector('.cr_name').value.trim(), cu=r.querySelector('.cr_cur').value;
    const st=r.querySelector('.cr_start').value, en=r.querySelector('.cr_end').value;
    if(!nm && !cu && !st && !en) continue; // fila totalmente vacía: se ignora
    if(!nm||!cu||!st||!en){ toast('⚠ Completa país, moneda, llegada y salida en cada fila'); return; }
    if(st<ps||en>pe){ toast('⚠ Las fechas de '+nm+' deben estar dentro del programa ('+fdate(ps)+' – '+fdate(pe)+')'); return; }
    if(en<st){ toast('⚠ En '+nm+' la salida no puede ser antes de la llegada'); return; }
    rows.push({name:nm,currency:cu,start:st,end:en});
  }
  if(!rows.length){ toast('⚠ Agrega al menos un país completo'); return; }
  const name=val('pf_name');
  if(id){
    const p=state.programs.find(x=>x.id===id);
    p.name=name; p.description=val('pf_desc'); p.startDate=val('pf_start'); p.endDate=val('pf_end');
    p.coordinator=val('pf_coord'); p.coordPhone=val('pf_phone');
    rows.forEach(r=>{ const ex=p.countries.find(c=>c.name.toLowerCase()===r.name.toLowerCase());
      if(ex){ex.currency=r.currency;ex.startDate=r.start;ex.endDate=r.end;}
      else p.countries.push({id:uid(),name:r.name,currency:r.currency,startDate:r.start,endDate:r.end}); });
    p.countries=p.countries.filter(c=>rows.some(r=>r.name.toLowerCase()===c.name.toLowerCase()));
    ensureDays(p);
    toast('✓ Programa actualizado');
  }else{
    const p={id:uid(),name,description:val('pf_desc'),startDate:val('pf_start'),endDate:val('pf_end'),
      coordinator:val('pf_coord'),coordPhone:val('pf_phone'),
      countries:rows.map(r=>({id:uid(),name:r.name,currency:r.currency,startDate:r.start,endDate:r.end})),
      sections:[],schedule:[],budget:[],expenses:[],tasks:[],participants:[],flights:[],student:{}};
    ensureDays(p);
    state.programs.push(p); cur={view:'program',programId:p.id,tab:'resumen'};
    toast('🎉 Programa creado');
  }
  closeModal(); save();
}
function deleteProgram(id){
  if(!confirm('¿Eliminar este programa y todos sus datos? Esta acción no se puede deshacer.')) return;
  state.programs=state.programs.filter(p=>p.id!==id);
  cur={view:'dashboard',programId:null,tab:'resumen'}; toast('Programa eliminado'); save();
}

      <div class="frow c2"><div class="field"><label>Nombre *</label><input id="s_name" value="${esc(s?.name||'')}"></div>
        <div class="field"><label>Edad *</label><input type="number" id="s_age" value="${s?.age||''}"></div></div>
      <div class="frow c2"><div class="field"><label>Email *</label><input id="s_email" value="${esc(s?.email||'')}"></div>
        <div class="field"><label>Teléfono *</label><input id="s_phone" value="${esc(s?.phone||'')}"></div></div>
      <div class="field"><label>Origen (ciudad / colegio) *</label><input id="s_origin" value="${esc(s?.origin||'')}" placeholder="Miami, FL"></div>
      <div class="field"><label>Contacto de emergencia *</label><input id="s_emerg" value="${esc(s?.emergency||'')}" placeholder="Nombre y teléfono"></div>
      <div class="field"><label>Notas <span class="hint">(alergias, requisitos…)</span></label><textarea id="s_notes">${esc(s?.notes||'')}</textarea></div>
    </div>
    <div class="modal-foot"><div class="fill"></div><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-blue" onclick="saveStudent(${sId?`'${sId}'`:'null'})">Guardar</button></div></div>`);
}
function saveStudent(sId){
  const p=getProg();
  if(!checkRequired([['s_name','Nombre'],['s_age','Edad'],['s_email','Email'],['s_phone','Teléfono'],['s_origin','Origen'],['s_emerg','Contacto de emergencia']])) return;
  const data={name:val('s_name'),age:val('s_age'),email:val('s_email'),phone:val('s_phone'),origin:val('s_origin'),emergency:val('s_emerg'),notes:val('s_notes')};
  if(sId){ Object.assign(p.participants.find(x=>x.id===sId),data); } else p.participants.push({id:uid(),...data});
  closeModal(); toast('✓ Participante guardado'); save();
}
function delStudent(id){ const p=getProg(); p.participants=p.participants.filter(s=>s.id!==id); save(); }

/* ===================== EXPORT / IMPORT ===================== */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='primeraglobal-programas-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('⬇ Respaldo descargado');
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.programs){ if(confirm('¿Reemplazar los datos actuales con el respaldo?')){ state=d; cur={view:'dashboard',programId:null,tab:'resumen'}; toast('⬆ Datos importados'); save(); } } else toast('⚠ Archivo no válido'); }catch(e){ toast('⚠ No se pudo leer el archivo'); } };
  r.readAsText(f); ev.target.value='';
}

/* ===================== TOAST ===================== */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>${esc(msg)}`;
  t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ===================== INIT ===================== */
(async function init(){
  await ensureUser();
  await loadState();
  render();
  if(REMOTE){ setInterval(pollRemote, 8000); } // refresca con los cambios del equipo cada 8 s
})();
</script>
</body>
</html>
